name: CI-CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t my-app .

    - name: Run container
      run: |
        docker stop app || true
        docker rm app || true
        docker run -d -p 5000:5000 --name app my-app